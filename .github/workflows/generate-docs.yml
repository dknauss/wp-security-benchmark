name: Generate PDF, Word & EPUB Documents

on:
  push:
    branches: [main]
    paths:
      - 'WordPress-Security-Benchmark.md'
      - '.github/workflows/generate-docs.yml'
      - '.github/pandoc/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-docs:
    uses: dknauss/ai-assisted-docs/.github/workflows/reusable-generate-docs.yml@main
    with:
      primary_markdown: WordPress-Security-Benchmark.md
    secrets: inherit
