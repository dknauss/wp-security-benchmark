name: Bug report
description: Report inaccurate benchmark guidance, artifact issues, or workflow failures.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: input
    id: area
    attributes:
      label: Affected area
      description: Name the control, section, artifact, or workflow involved.
      placeholder: Control 3.4, metrics validation, PDF output
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction details
      description: Include references, commands, screenshots, or supporting evidence.
